name: CI/CD
on:
  push:
    branches: [main]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-dados: ${{ steps.filter.outputs.api-dados }}
      worker-mqtt: ${{ steps.filter.outputs.worker-mqtt }}
      repo_lc: ${{ steps.repo.outputs.repo_lc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - './src/hmi/**'
            api-dados:
              - './src/api/**'
            worker-mqtt:
              - './src/worker-mqtt/**'
      - name: Definir nome do repo em minusculo
        id: repo
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar environment.ts
        env:
          ENV_HMI: ${{ secrets.ENV_HMI }}
        run: |
          echo "$ENV_HMI" > /tmp/env_hmi.env
          # O uso do awk e tr garante a extração correta mesmo se houver espaços em branco ou quebras de linha invisíveis (carriage returns)
          API_URL=$(awk -F '=' '/^API_URL/ {print $2}' /tmp/env_hmi.env | tr -d ' ' | tr -d '\r')
          sed -e "s|__API_URL__|$API_URL|g" src/hmi/src/environments/environment.template.ts > src/hmi/src/environments/environment.ts
          rm /tmp/env_hmi.env

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/hmi
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.repo_lc }}/hmi:latest

  build-api-dados:
    needs: changes
    if: needs.changes.outputs.api-dados == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.repo_lc }}/api:latest

  build-worker-mqtt:
    needs: changes
    if: needs.changes.outputs.worker-mqtt == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/worker-mqtt
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.repo_lc }}/worker-mqtt:latest

  deploy:
    needs: [changes, build-frontend, build-api-dados, build-worker-mqtt]
    if: |
      always() &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-api-dados.result == 'success' || needs.build-api-dados.result == 'skipped') &&
      (needs.build-worker-mqtt.result == 'success' || needs.build-worker-mqtt.result == 'skipped')
    runs-on: self-hosted
    steps:
      - name: Escrever .env files de forma segura
        env:
          ENV_API_DADOS: ${{ secrets.ENV_API_DADOS }}
          ENV_WORKER_MQTT: ${{ secrets.ENV_WORKER_MQTT }}
        run: |
          echo "$ENV_API_DADOS" > /srv/app/api/.env
          echo "$ENV_WORKER_MQTT" > /srv/app/worker-mqtt/.env
          
      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Deploy e Execução de Migrations
        run: |
          docker compose -f /srv/app/api/docker-compose.yml pull
          docker compose -f /srv/app/api/docker-compose.yml up -d
          
          # Pausa estratégica para inicialização do BD e da API
          sleep 10
          
          # Execução não-interativa. Substitua 'app-api-1' pelo nome exato do serviço no compose caso este seja apenas o nome do container gerado.
          docker exec -i app-api-1 npx sequelize-cli db:migrate
