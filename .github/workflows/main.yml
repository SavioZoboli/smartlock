name: CI/CD
on:
  push:
    branches: [main]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-dados: ${{ steps.filter.outputs.api-dados }}
      worker-mqtt: ${{ steps.filter.outputs.worker-mqtt }}
      repo_lc: ${{ steps.repo.outputs.repo_lc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - './src/hmi/**'
            api-dados:
              - './src/api/**'
            worker-mqtt:
              - './src/worker-mqtt/**'
      - name: Definir nome do repo em minusculo
        id: repo
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gerar environment.ts
        run: |
          echo "${{ secrets.ENV_HMI }}" > /tmp/env_hmi.env
          API_URL=$(grep '^API_URL=' /tmp/env_hmi.env | cut -d '=' -f2-)
          sed -e "s|__API_URL__|$API_URL|g" \
            src/hmi/src/environments/environment.template.ts \
            > src/hmi/src/environments/environment.ts
          rm /tmp/env_hmi.env

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/hmi
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.repo_lc }}/hmi:latest

  build-api-dados:
    needs: changes
    if: needs.changes.outputs.api-dados == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.repo_lc }}/api:latest

  build-worker-mqtt:
    needs: changes
    if: needs.changes.outputs.worker-mqtt == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/worker-mqtt
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.repo_lc }}/worker-mqtt:latest

  deploy:
    needs: [changes, build-frontend, build-api-dados, build-worker-mqtt]
    if: |
      always() &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-api-dados.result == 'success' || needs.build-api-dados.result == 'skipped') &&
      (needs.build-worker-mqtt.result == 'success' || needs.build-worker-mqtt.result == 'skipped')
    runs-on: self-hosted
    steps:
      - name: Escrever .env files
        run: |
          echo "${{ secrets.ENV_API_DADOS }}" > /srv/app/api/.env
          echo "${{ secrets.ENV_WORKER_MQTT }}" > /srv/app/worker-mqtt/.env
      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Deploy
        run: |
          docker compose -f /srv/app/docker-compose.yml pull
          docker compose -f /srv/app/docker-compose.yml up -d
