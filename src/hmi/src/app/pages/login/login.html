<div class="login-container">
  <div class="login-image-section"></div>

  <div class="login-form-section">
    <div class="login-content">
      
      <div class="logo-container">
        <img src="" alt="Logo Smart Lock" class="logo-placeholder">
      </div>

      <div class="header-text">
        <h2>Acesse o Sistema</h2>
        <p>Utilize sua conta institucional para entrar na HMI.</p>
      </div>

      <button mat-flat-button class="google-login-btn full-width" type="button" (click)="loginWithGoogle()">
        <span class="google-btn-content">
          <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
          <span class="btn-text">Entrar com a Conta Google</span>
        </span>
      </button>

      <div class="divider">
        <span class="divider-text">ou acesse com e-mail local</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail ou Matrícula</mat-label>
          <input matInput type="email" formControlName="email" placeholder="exemplo@instituicao.com.br">
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">O campo é obrigatório.</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Insira um e-mail válido.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">A senha é obrigatória.</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <a href="#" class="forgot-password">Esqueceu a senha?</a>
        </div>

        <button mat-stroked-button type="submit" class="full-width manual-submit-btn">
          Acessar via credenciais
        </button>

      </form>

      <div class="footer-notice">
        Problemas com seu acesso institucional? <a href="#">Contatar o TI</a>
      </div>

    </div>
  </div>
</div>
