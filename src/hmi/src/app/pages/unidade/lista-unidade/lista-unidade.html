<div class="page-container">
  <div class="page-header-container with-actions">
    <div class="title-area">
      <div class="breadcrumb">Gerenciamento / Unidades</div>
      <h2>Unidades Cadastradas</h2>
    </div>
    
    <div class="action-area">
      <button mat-flat-button class="btn-new" (click)="onNovaUnidade()">
        <mat-icon>add</mat-icon> Nova Unidade
      </button>
    </div>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0 custom-table">
      
      <ng-container matColumnDef="entidade">
        <th mat-header-cell *matHeaderCellDef> Entidade </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="chip-entidade">{{ element.entidade }}</span> 
        </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome da Unidade </th>
        <td mat-cell *matCellDef="let element" class="fw-500"> {{ element.nome }} </td>
      </ng-container>

      <ng-container matColumnDef="regional">
        <th mat-header-cell *matHeaderCellDef> Regional </th>
        <td mat-cell *matCellDef="let element"> 
          <mat-icon class="inline-icon">map</mat-icon> {{ element.regional }} 
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef class="align-right"> Ações </th>
        <td mat-cell *matCellDef="let element" class="align-right">
          <button mat-icon-button class="action-btn edit-btn" matTooltip="Editar" (click)="onEditar(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="action-btn delete-btn" matTooltip="Excluir" (click)="onExcluir(element)">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="custom-row"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" colspan="4">
          Nenhuma unidade cadastrada ou encontrada.
        </td>
      </tr>
    </table>

    <mat-paginator 
      [pageSizeOptions]="[10, 20, 50]" 
      showFirstLastButtons
      class="custom-paginator">
    </mat-paginator>
  </div>
</div>
